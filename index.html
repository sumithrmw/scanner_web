<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Barcode Scanner</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }
    video {
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
      margin-top: 20px;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      color: #00ff99;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00ff99;
      color: black;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Mobile Barcode Scanner</h2>
  <video id="video" playsinline autoplay></video>
  <br>
  <button id="startBtn">Start Scanner</button>
  <div id="result">Waiting...</div>

  <script type="module" src="/main.js"></script>

</body>
</html>
