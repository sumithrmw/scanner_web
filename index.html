<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>📦 Scanner</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;max-width:600px;margin:0 auto;padding:16px;line-height:1.5}
    h1{text-align:center;margin-bottom:16px;color:#333}
    .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px}
    input,button{width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;-webkit-tap-highlight-color:transparent}
    button{background:#007bff;color:#fff;border:none;font-weight:600;cursor:pointer;transition:transform .1s,opacity .2s}
    button:active{transform:scale(.98)}
    button:disabled{opacity:.6;cursor:not-allowed}
    button.secondary{background:#6c757d}
    button.danger{background:#dc3545}
    video{width:100%;border-radius:8px;background:#000;max-height:400px;object-fit:cover}
    #result{font-weight:600;text-align:center;padding:12px;background:#e9ecef;border-radius:8px;margin:10px 0;min-height:48px;display:flex;align-items:center;justify-content:center}
    .item{border:1px solid #eee;padding:12px;margin:8px 0;border-radius:6px;background:#fafafa;display:flex;gap:12px;align-items:flex-start}
    .item img{width:80px;height:80px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#eee}
    .item-info{flex:1;min-width:0}
    .item-info strong{word-break:break-all;display:block;margin-bottom:4px}
    .item-info small{color:#666}
    .hidden{display:none!important}
    #msg{font-size:14px;margin-top:8px;text-align:center;min-height:20px}
    .error{color:#dc3545}
    .success{color:#28a745}
    .loading{opacity:.6;pointer-events:none;position:relative}
    .loading::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.7);border-radius:8px}
    @media(max-width:400px){body{padding:12px}.card{padding:16px}}
  </style>
</head>
<body>
  <h1>📦 Scanner</h1>

  <!-- Login Card -->
  <div id="login" class="card">
    <form id="loginForm" autocomplete="on">
      <input id="email" type="email" placeholder="Email" autocomplete="email" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit" id="loginBtn">🔓 Login</button>
    </form>
    <p id="msg" role="alert"></p>
  </div>

  <!-- App Card (hidden until logged in) -->
  <div id="app" class="hidden">

    <!-- SCREEN 1: Barcode Entry -->
    <div id="screen1" class="card">
      <h2 style="text-align:center;margin-bottom:20px">📦 Scan or Enter Barcode</h2>

      <video id="video" playsinline autoplay muted></video>
      <div id="result">Tap Start to scan</div>

      <button id="startBtn">▶️ Start Scanning</button>
      <button id="stopBtn" class="secondary hidden">⏹️ Stop Scanning</button>

      <div style="text-align:center;margin:16px 0;color:#666">OR</div>

      <input id="barcodeInput" type="text" placeholder="Enter barcode manually" autocomplete="off" />
      <button id="submitBarcodeBtn" style="background:#28a745">✅ Submit Barcode</button>

      <p id="barcodeMsg" role="alert"></p>
    </div>

    <!-- SCREEN 2: Photo & Description -->
    <div id="screen2" class="card hidden">
      <h2 style="text-align:center;margin-bottom:20px">📸 Capture Photo & Details</h2>

      <strong style="display:block;margin-bottom:16px">Barcode: <span id="confirmedCode"></span></strong>

      <!-- Camera for photo capture -->
      <video id="captureVideo" playsinline autoplay muted class="hidden"></video>

      <button id="captureBtn" style="margin-bottom:10px">📸 Take Photo</button>
      <img id="preview" class="hidden" alt="Photo preview" style="margin-bottom:10px;border-radius:8px;width:100%;height:auto;object-fit:cover;" />

      <!-- Fallback file input (hidden) -->
      <input id="file" type="file" accept="image/*" class="hidden" />

      <input id="desc" placeholder="Description (optional)" style="margin:10px 0" />

      <button id="saveBtn" style="margin-top:10px;background:#28a745">💾 Save Item</button>
      <button id="backBtn" class="secondary" style="margin-top:8px">⬅️ Back</button>
      <p id="saveMsg" role="alert"></p>
    </div>

    <!-- History Section -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>📋 History</strong>
        <button id="refreshBtn" class="secondary" style="width:auto;padding:8px 16px;margin:0">🔄</button>
      </div>
      <div id="list" style="max-height:300px;overflow-y:auto"></div>
    </div>

    <button id="logoutBtn" class="danger">🚪 Logout</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
