<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📦 Mobile Barcode Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary { background: #6c757d; }
    button.secondary:hover { background: #545b62; }
    button.danger { background: #dc3545; }
    button.danger:hover { background: #c82333; }
    video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      margin: 10px 0;
    }
    #result {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      padding: 10px;
      background: #e9ecef;
      border-radius: 8px;
      margin: 10px 0;
    }
    .item-card {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      background: #fafafa;
    }
    .item-card img {
      max-width: 100px;
      max-height: 100px;
      border-radius: 4px;
      margin: 5px 0;
    }
    .hidden { display: none !important; }
    .error { color: #dc3545; }
    .success { color: #28a745; }
    label { font-weight: bold; display: block; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>📦 Mobile Barcode Scanner</h1>

  <!-- Auth Section -->
  <div id="auth-section" class="card">
    <h2>🔐 Authentication</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="signupBtn">📝 Sign Up</button>
    <button id="loginBtn">🔑 Log In</button>
    <button id="logoutBtn" class="danger hidden">🚪 Log Out</button>
    <p id="auth-message"></p>
  </div>

  <!-- Scanner Section -->
  <div id="scanner-section" class="card hidden">
    <h2>📷 Scanner</h2>
    <video id="video" playsinline autoplay muted></video>
    <div id="result">Waiting...</div>
    <button id="startBtn">▶️ Start Scanner</button>

    <!-- Save Section (shows after scan) -->
    <div id="save-section" class="hidden" style="margin-top: 20px; border-top: 2px solid #ddd; padding-top: 20px;">
      <h3>💾 Save Item</h3>
      <label>Barcode:</label>
      <input type="text" id="barcode-display" readonly />
      <label>Description (optional):</label>
      <input type="text" id="description" placeholder="Item description" />
      <label>Photo (optional):</label>
      <input type="file" id="image-input" accept="image/*" />
      <button id="saveBtn">✅ Save Item</button>
      <button id="cancelBtn" class="secondary">❌ Cancel</button>
      <p id="save-message"></p>
    </div>
  </div>

  <!-- History Section -->
  <div id="history-section" class="card hidden">
    <h2>📋 My Items</h2>
    <div id="items-list"></div>
    <button id="loadHistoryBtn" class="secondary">🔄 Refresh</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
