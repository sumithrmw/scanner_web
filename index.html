<body>
  <h1>📦 Mobile Barcode Scanner</h1>

  <!-- Auth Section -->
  <div id="auth-section">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Log In</button>
    <button id="logoutBtn" style="display:none">Log Out</button>
    <p id="auth-message"></p>
  </div>

  <!-- Scanner Section (hidden until logged in) -->
  <div id="scanner-section" style="display:none">
    <video id="video" playsinline autoplay muted></video>
    <div id="result">Waiting...</div>
    <button id="startBtn">Start Scanner</button>

    <!-- Add description + image after scan -->
    <div id="save-section" style="display:none; margin-top:1rem">
      <input type="text" id="description" placeholder="Item description (optional)" />
      <input type="file" id="image-input" accept="image/*" />
      <button id="saveBtn">💾 Save Item</button>
      <p id="save-message"></p>
    </div>
  </div>

  <!-- History Section -->
  <div id="history-section" style="display:none; margin-top:2rem">
    <h3>📋 My Scanned Items</h3>
    <div id="items-list"></div>
    <button id="loadHistoryBtn">🔄 Refresh History</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
