<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Barcode Scanner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
        }
        video {
            width: 100%;
            max-width: 400px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #000;
            margin: 15px 0;
        }
        #result {
            margin: 20px 0;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            min-height: 30px;
        }
        #startBtn {
            padding: 12px 30px;
            font-size: 1rem;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 10px 0;
        }
        #startBtn:active {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Mobile Barcode S0anner</h1>
    
    <!-- Critical: playsinline allows video to work properly on iOS -->
    <video id="video" playsinline autoplay muted></video>
    
    <div id="result">Waiting...</div>
    <button id="startBtn">Start Scanner</button>

    <script type="module" src="main.js"></script>
</body>
</html>
