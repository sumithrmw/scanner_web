<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>📦 Scanner</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;max-width:600px;margin:0 auto;padding:16px;line-height:1.5}
    h1{text-align:center;margin-bottom:16px;color:#333}
    .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px}
    input,button{width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;-webkit-tap-highlight-color:transparent}
    button{background:#007bff;color:#fff;border:none;font-weight:600;cursor:pointer;transition:transform .1s}
    button:active{transform:scale(.98)}
    button.secondary{background:#6c757d}
    button.danger{background:#dc3545}
    video{width:100%;border-radius:8px;background:#000;max-height:400px}
    #result{font-weight:600;text-align:center;padding:12px;background:#e9ecef;border-radius:8px;margin:10px 0}
    .item{border:1px solid #eee;padding:12px;margin:8px 0;border-radius:6px;background:#fafafa;display:flex;gap:12px;align-items:flex-start}
    .item img{width:80px;height:80px;object-fit:cover;border-radius:4px;flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-info strong{word-break:break-all}
    .item-info small{color:#666}
    .hidden{display:none!important}
    #msg{font-size:14px;margin-top:8px;text-align:center}
    .error{color:#dc3545}
    .success{color:#28a745}
    .loading{opacity:.6;pointer-events:none}
    @media(max-width:400px){body{padding:12px}.card{padding:16px}}
  </style>
  <script type="module" crossorigin src="/scanner_web/assets/index-B3WHx3bJ.js"></script>
</head>
<body>
  <h1>📦 Scanner</h1>

  <!-- Login -->
  <div id="login" class="card">
    <input id="email" type="email" placeholder="Email" autocomplete="email" />
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="loginBtn">🔓 Login</button>
    <p id="msg"></p>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="card">
      <video id="video" playsinline autoplay muted></video>
      <div id="result">Tap Start to scan</div>
      <button id="startBtn">▶️ Start</button>
    </div>

    <div id="save" class="card hidden">
      <strong>✅ <span id="code"></span></strong>
      <input id="desc" placeholder="Description (optional)" style="margin-top:10px" />
      <input id="file" type="file" accept="image/*" style="margin-top:8px" />
      <button id="saveBtn" style="margin-top:10px">💾 Save</button>
      <button id="cancelBtn" class="secondary" style="margin-top:8px">Cancel</button>
      <p id="saveMsg"></p>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>📋 History</strong>
        <button id="refreshBtn" class="secondary" style="width:auto;padding:8px 16px;margin:0">🔄</button>
      </div>
      <div id="list" style="max-height:300px;overflow-y:auto"></div>
    </div>

    <button id="logoutBtn" class="danger">🚪 Logout</button>
  </div>

</body>
</html>
