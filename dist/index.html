<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📦 Mobile Barcode Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    h2 { margin-bottom: 15px; color: #333; }
    h3 { margin: 15px 0 10px; color: #555; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    button:hover:not(:disabled) { background: #0056b3; }
    button:disabled { 
      background: #ccc; 
      cursor: not-allowed; 
      opacity: 0.6;
    }
    button.secondary { background: #6c757d; }
    button.secondary:hover:not(:disabled) { background: #545b62; }
    button.danger { background: #dc3545; }
    button.danger:hover:not(:disabled) { background: #c82333; }
    video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      margin: 10px 0;
    }
    #result {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      padding: 10px;
      background: #e9ecef;
      border-radius: 8px;
      margin: 10px 0;
    }
    .item-card {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      background: #fafafa;
    }
    .item-card img {
      max-width: 100px;
      max-height: 100px;
      border-radius: 4px;
      margin: 5px 0;
      display: block;
    }
    .hidden { display: none !important; }
    .error { color: #dc3545 !important; }
    .success { color: #28a745 !important; }
    .info { color: #007bff !important; }
    label { 
      font-weight: bold; 
      display: block; 
      margin-top: 10px;
      color: #555;
    }
    
    /* Auth Tabs */
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    .tab.active {
      border-color: #007bff;
      background: #007bff;
      color: white;
    }
    .tab:hover:not(.active) {
      border-color: #007bff;
    }
    
    /* Password Strength */
    .password-strength {
      margin: 10px 0;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .strength-bar {
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    #strength-fill {
      height: 100%;
      width: 0%;
      background: #dc3545;
      transition: all 0.3s;
      border-radius: 4px;
    }
    #strength-text {
      font-size: 12px;
      color: #666;
    }
    
    /* Loading Spinner */
    #auth-loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script type="module" crossorigin src="/scanner_web/assets/index-Bfb59brb.js"></script>
</head>
<body>
  <h1>📦 Mobile Barcode Scanner</h1>

  <!-- Auth Section -->
  <div id="auth-section" class="card">
    <h2>🔐 Authentication</h2>
    
    <!-- Tabs for Login/Signup -->
    <div class="auth-tabs">
      <button id="tab-login" class="tab active">🔑 Log In</button>
      <button id="tab-signup" class="tab">📝 Sign Up</button>
    </div>
    
    <!-- Login Form -->
    <div id="login-form">
      <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn" class="primary">🔑 Log In</button>
    </div>
    
    <!-- Signup Form -->
    <div id="signup-form" class="hidden">
      <input type="email" id="signup-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="signup-password" placeholder="Password (min 6 chars)" autocomplete="new-password" />
      <input type="password" id="signup-confirm" placeholder="Confirm Password" autocomplete="new-password" />
      
      <!-- Password Strength Indicator -->
      <div class="password-strength">
        <div class="strength-bar">
          <div id="strength-fill"></div>
        </div>
        <span id="strength-text">Password strength</span>
      </div>
      
      <button id="signupBtn" class="primary">📝 Create Account</button>
    </div>
    
    <!-- Logout Button -->
    <button id="logoutBtn" class="danger hidden">🚪 Log Out</button>
    
    <!-- Messages -->
    <p id="auth-message"></p>
    
    <!-- Loading Spinner -->
    <div id="auth-loading" class="hidden">
      <div class="spinner"></div>
      <p>Processing...</p>
    </div>
  </div>

  <!-- Scanner Section -->
  <div id="scanner-section" class="card hidden">
    <h2>📷 Scanner</h2>
    <video id="video" playsinline autoplay muted></video>
    <div id="result">Waiting...</div>
    <button id="startBtn">▶️ Start Scanner</button>

    <!-- Save Section (shows after scan) -->
    <div id="save-section" class="hidden" style="margin-top: 20px; border-top: 2px solid #ddd; padding-top: 20px;">
      <h3>💾 Save Item</h3>
      <label>Barcode:</label>
      <input type="text" id="barcode-display" readonly />
      <label>Description (optional):</label>
      <input type="text" id="description" placeholder="Item description" />
      <label>Photo (optional):</label>
      <input type="file" id="image-input" accept="image/*" />
      <button id="saveBtn">✅ Save Item</button>
      <button id="cancelBtn" class="secondary">❌ Cancel</button>
      <p id="save-message"></p>
    </div>
  </div>

  <!-- History Section -->
  <div id="history-section" class="card hidden">
    <h2>📋 My Items</h2>
    <div id="items-list"></div>
    <button id="loadHistoryBtn" class="secondary">🔄 Refresh</button>
  </div>

</body>
</html>
